                        - text: ', accessible from'
                        - link "a-guy.com" [ref=e47] [cursor=pointer]:
                            - /url: /
                        - text: ', one of our main priorities is the privacy of our visitors. This Privacy Policy document contains types of information that is collected, recorded, and how we use it.'
                    - paragraph [ref=e48]:
                        - text: If you have additional questions or require more information about our Privacy Policy, do not hesitate to
                        - link "contact us." [ref=e49] [cursor=pointer]:
                            - /url: /contact-us/
                    - paragraph [ref=e50]: This Privacy Policy applies only to our online activities and is valid for visitors to our website with regards to the information that they shared and/or collected in A-Guy Heating & Air. This policy is not applicable to any information collected offline or via channels other than this website.
                - heading "Consent" [level=3] [ref=e52]
                - paragraph [ref=e54]: By using our website, you hereby consent to our Privacy Policy and agree to its terms.
                - heading "Information We Collect" [level=3] [ref=e56]
                - generic [ref=e57]:
                    - paragraph [ref=e58]: The personal information that you are asked to provide, and the reasons why you are asked to provide it, will be made clear to you at the point we ask you to provide your personal information.
                    - paragraph [ref=e59]: If you contact us directly, we may receive additional information about you such as your name, email address, phone number, the contents of the message and/or attachments you may send us, and any other information you may choose to provide.
                    - paragraph [ref=e60]: When you register for our service, we may ask for your contact information, including items such as name, company name, address, email address, and telephone number.
                - heading "How We Use Your Information" [level=3] [ref=e62]
                - generic [ref=e63]:
                    - paragraph [ref=e64]:
                        - strong [ref=e65]: 'We use the information we collect in various ways, including to:'
                    - list [ref=e66]:
                        - listitem [ref=e67]: Provide, Operate, and Maintain our Website
                        - listitem [ref=e68]: Improve, Personalize, and Expand our Website
                        - listitem [ref=e69]: Understand and Analyze How you Use our Website
                        - listitem [ref=e70]: Develop New Products, Services, Features, and Functionality
                        - listitem [ref=e71]: Communicate with You, Either Directly or Through One of Our Partners, Including for Customer Service, to Provide you with Updates and Other Information Relating to the Website, and for Marketing and Promotional Purposes
                        - listitem [ref=e72]: Send you Emails
                        - listitem [ref=e73]: Find and Prevent Fraud
                - heading "Log Files" [level=3] [ref=e75]
                - paragraph [ref=e77]: A-Guy Heating & Air follows a standard procedure of using log files. These files log visitors when they visit websites. All hosting companies do this and a part of hosting services’ analytics. The information collected by log files include internet protocol (IP) addresses, browser type, Internet Service Provider (ISP), date and time stamp, referring/exit pages, and possibly the number of clicks. These are not linked to any information that is personally identifiable. The purpose of the information is for analyzing trends, administering the site, tracking users’ movement on the website, and gathering demographic information.
                - heading "Advertising Partners Privacy Policies" [level=3] [ref=e79]
                - generic [ref=e80]:
                    - paragraph [ref=e81]: You may consult this list to find the Privacy Policy for each of the advertising partners of A-Guy Heating & Air.
                    - paragraph [ref=e82]: Third-party ad servers or ad networks use technologies like cookies, JavaScript, or Web Beacons that are used in their respective advertisements and links that appear on A-Guy Heating & Air, which are sent directly to users’ browsers. They automatically receive your IP address when this occurs. These technologies are used to measure the effectiveness of their advertising campaigns and/or to personalize the advertising content that you see on websites that you visit.
                    - paragraph [ref=e83]: Note that A-Guy Heating & Air has no access to or control over these cookies that are used by third-party advertisers.
                - heading "Third Party Privacy Policies" [level=3] [ref=e85]
                - generic [ref=e86]:
                    - paragraph [ref=e87]: A-Guy Home Service’s Privacy Policy does not apply to other advertisers or websites. Thus, we are advising you to consult the respective Privacy Policies of these third-party ad servers for more detailed information. It may include their practices and instructions about how to opt-out of certain options.
                    - paragraph [ref=e88]: You can choose to disable cookies through your individual browser options. To know more detailed information about cookie management with specific web browsers, it can be found at the browsers’ respective websites.
                - heading "CCPA Privacy Rights (Do Not Sell My Personal Information)" [level=3] [ref=e90]
                - generic [ref=e91]:
                    - paragraph [ref=e92]: 'Under the CCPA, among other rights, California consumers have the right to:'
                    - list [ref=e93]:
                        - listitem [ref=e94]: Request that a business that collects a consumer’s personal data disclose the categories and specific pieces of personal data that a business has collected about consumers.
                        - listitem [ref=e95]: Request that a business delete any personal data about the consumer that a business has collected.
                        - listitem [ref=e96]: Request that a business that sells a consumer’s personal data, not sell the consumer’s personal data.
                    - paragraph [ref=e97]: If you make a request, we have one month to respond to you. If you would like to exercise any of these rights, please contact us.
                - heading "GDPR Data Protection Rights" [level=3] [ref=e99]
                - generic [ref=e100]:
                    - paragraph [ref=e101]: 'We would like to make sure you are fully aware of all of your data protection rights. Every user is entitled to the following:'
                    - list [ref=e102]:
                        - listitem [ref=e103]:
                            - strong [ref=e104]: The Right To Access
                            - text: ': You have the right to request copies of your personal data. We may charge you a small fee for this service.'
                        - listitem [ref=e105]:
                            - strong [ref=e106]: The Right To Rectification
                            - text: ': You have the right to request that we correct any information you believe is inaccurate. You also have the right to request that we complete the information you believe is incomplete.'
                        - listitem [ref=e107]:
                            - strong [ref=e108]: The Right To Erasure
                            - text: ': You have the right to request that we erase your personal data, under certain conditions.'
                        - listitem [ref=e109]:
                            - strong [ref=e110]: The Right To Restrict Processing
                            - text: ': You have the right to request that we restrict the processing of your personal data, under certain conditions.'
                        - listitem [ref=e111]:
                            - strong [ref=e112]: The Right To Object To Processing
                            - text: ': You have the right to object to our processing of your personal data, under certain conditions.'
                        - listitem [ref=e113]:
                            - strong [ref=e114]: The Right To Data Portability
                            - text: ': You have the right to request that we transfer the data that we have collected to another organization, or directly to you, under certain conditions.'
                    - paragraph [ref=e115]:
                        - text: If you make a request, we have one month to respond to you. If you would like to exercise any of these rights, please
                        - link "contact us" [ref=e116] [cursor=pointer]:
                            - /url: /contact-us/
                        - text: .
                - heading "Children’s Information" [level=3] [ref=e118]
                - generic [ref=e119]:
                    - paragraph [ref=e120]: Another part of our priority is adding protection for children while using the internet. We encourage parents and guardians to observe, participate in, and/or monitor and guide their online activity.
                    - paragraph [ref=e121]: A-Guy Heating & Air does not knowingly collect any Personal Identifiable Information from children under the age of 13. If you think that your child provided this kind of information on our website, we strongly encourage you to contact us immediately and we will do our best efforts to promptly remove such information from our records.
